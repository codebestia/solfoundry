name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      image_tag:
        description: 'Specific image tag to deploy (e.g. for rollback)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # 1. Quality Gate (Lint & Test)
  quality-gate:
    if: github.event_name == 'pull_request'
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Backend Lint
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

      - name: Backend Tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest tests/
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db

      - name: Frontend Lint & Typecheck
        working-directory: frontend
        run: |
          npm ci
          npm run lint --if-present
          npx tsc --noEmit

  # 2. Deployment Trigger (delegates to `.github/workflows/deploy.yml`)
  # Consolidation: `deploy.yml` is the single authoritative deployment workflow.
  trigger-deploy:
    if: github.event_name == 'workflow_dispatch'
    name: Trigger deploy.yml (staging/production/rollback)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering deploy.yml environment=${{ inputs.environment }} image_tag='${{ inputs.image_tag }}'"
          gh workflow run deploy.yml \
            --ref "${{ github.ref_name }}" \
            -f environment="${{ inputs.environment }}" \
            -f image_tag="${{ inputs.image_tag }}"
