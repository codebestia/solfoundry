# Deploy Pipeline - Runs on merge to main branch
# Builds and deploys frontend to Vercel/DO and backend as Docker container

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: 'Specific backend image tag / git sha to deploy (rollback). Leave empty for latest.'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  # Push to main auto-deploys staging; production is manual via workflow_dispatch.
  DEPLOY_ENV: ${{ github.event_name == 'push' && 'staging' || inputs.environment }}
  # Rollback uses an immutable image tag and is independent from source checkout.
  BACKEND_IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  # ==================== BUILD FRONTEND ====================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_tag == ''
    outputs:
      has_frontend: ${{ steps.check.outputs.has_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for package.json
        id: check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "has_frontend=true" >> $GITHUB_OUTPUT
          else
            echo "has_frontend=false" >> $GITHUB_OUTPUT
            echo "::notice::No frontend package.json found - skipping frontend build"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.has_frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        if: steps.check.outputs.has_frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build Production Bundle
        if: steps.check.outputs.has_frontend == 'true'
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Upload Build Artifacts
        if: steps.check.outputs.has_frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ==================== DEPLOY FRONTEND TO VERCEL ====================
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    needs: build-frontend
    if: (github.event_name != 'workflow_dispatch' || inputs.image_tag == '') && needs.build-frontend.outputs.has_frontend == 'true'
    outputs:
      vercel_preview_url: ${{ steps.vercel_deploy_preview.outputs['preview-url'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        id: vercel_deploy
        if: env.DEPLOY_ENV == 'production'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: frontend

      - name: Deploy to Vercel (staging/preview)
        id: vercel_deploy_preview
        if: env.DEPLOY_ENV != 'production'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod flag => preview deployment; action exposes `preview-url`.
          working-directory: frontend

      - name: Publish staging URL
        if: env.DEPLOY_ENV != 'production'
        run: |
          echo "- [Staging Site](${{ steps.vercel_deploy_preview.outputs['preview-url'] }})" >> $GITHUB_STEP_SUMMARY

      - name: Upload staging URL artifact
        if: env.DEPLOY_ENV != 'production'
        run: |
          echo "${{ steps.vercel_deploy_preview.outputs['preview-url'] }}" > staging-url.txt
          cat staging-url.txt >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Upload staging URL artifact (file)
        if: env.DEPLOY_ENV != 'production'
        uses: actions/upload-artifact@v4
        with:
          name: staging-url
          path: staging-url.txt
          retention-days: 7

  # ==================== BUILD & PUSH CONTAINER IMAGES ====================
  build-and-push-images:
    name: Build and Push Images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image_tag: ${{ steps.tags.outputs.backend_image_tag }}
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.image_tag == '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BACKEND_TAGS="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          FRONTEND_TAGS="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            BACKEND_TAGS="$BACKEND_TAGS,${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
            FRONTEND_TAGS="$FRONTEND_TAGS,${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"
          else
            BACKEND_TAGS="$BACKEND_TAGS,${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:staging"
            FRONTEND_TAGS="$FRONTEND_TAGS,${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:staging"
          fi
          echo "backend_tags=$BACKEND_TAGS" >> $GITHUB_OUTPUT
          echo "frontend_tags=$FRONTEND_TAGS" >> $GITHUB_OUTPUT
          echo "backend_image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./backend/Dockerfile

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./frontend/Dockerfile

  # ==================== DEPLOY REDIS TO DIGITALOCEAN ====================
  deploy-redis:
    name: Deploy Redis (DigitalOcean)
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    needs: build-and-push-images
    if: always()
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Apply Redis resources
        run: |
          kubectl apply --namespace ${{ env.DEPLOY_ENV }} -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: solfoundry-redis
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: solfoundry-redis
            template:
              metadata:
                labels:
                  app: solfoundry-redis
              spec:
                containers:
                - name: redis
                  image: redis:7-alpine
                  ports:
                  - containerPort: 6379
                  readinessProbe:
                    tcpSocket:
                      port: 6379
                    initialDelaySeconds: 5
                    periodSeconds: 10
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: redis
          spec:
            selector:
              app: solfoundry-redis
            ports:
            - protocol: TCP
              port: 6379
              targetPort: 6379
          EOF

      - name: Wait for Redis rollout
        run: |
          kubectl rollout status deployment/solfoundry-redis --namespace ${{ env.DEPLOY_ENV }} --timeout=300s

  # ==================== DEPLOY BACKEND TO DIGITALOCEAN ====================
  deploy-backend:
    name: Deploy Backend (DigitalOcean)
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    needs: [build-and-push-images, deploy-redis]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          # Update deployment image
          kubectl set image deployment/solfoundry-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ env.BACKEND_IMAGE_TAG }} \
            --namespace ${{ env.DEPLOY_ENV }}
          
          # Wait for rollout
          kubectl rollout status deployment/solfoundry-backend \
            --namespace ${{ env.DEPLOY_ENV }} \
            --timeout=300s

  # ==================== DATABASE MIGRATIONS ====================
  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    needs: deploy-backend
    if: env.DEPLOY_ENV == 'production' && (github.event_name != 'workflow_dispatch' || inputs.image_tag == '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install alembic

      - name: Run Migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ==================== DEPLOYMENT VERIFICATION ====================
  # Verify backend readiness + frontend health after rollout.
  verify-deployment:
    name: Verify Deployment (health checks)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, migrate-database]
    if: always()
    environment: ${{ env.DEPLOY_ENV }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Verify backend /health via port-forward
        env:
          KUBE_NAMESPACE: ${{ env.DEPLOY_ENV }}
        run: |
          set -euo pipefail
          kubectl port-forward deployment/solfoundry-backend 18000:8000 --namespace "$KUBE_NAMESPACE" >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" >/dev/null 2>&1 || true' EXIT
          for i in {1..30}; do
            if curl -fsS http://localhost:18000/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          HEALTH_JSON="$(curl -fsS http://localhost:18000/health)"
          echo "$HEALTH_JSON"
          HEALTH_JSON="$HEALTH_JSON" python - <<'PY'
import json, os
health = json.loads(os.environ["HEALTH_JSON"])
if health.get("database") != "ok":
    raise SystemExit("backend database connectivity check failed")
if health.get("redis") != "ok":
    raise SystemExit("backend redis connectivity check failed")
print("backend health verified (database + redis)")
PY

      - name: Verify frontend /health endpoint
        if: github.event_name != 'workflow_dispatch' || inputs.image_tag == ''
        run: |
          set -euo pipefail
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            curl -fsS https://solfoundry.org/health | head -n 1
          else
            curl -fsS "${{ needs.deploy-frontend.outputs.vercel_preview_url }}/health" | head -n 1
          fi

  # ==================== DEPLOYMENT SUMMARY ====================
  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-frontend, build-and-push-images, deploy-redis, deploy-backend, migrate-database, verify-deployment]
    if: always()
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.DEPLOY_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend Image Tag:** ${{ env.BACKEND_IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Deploy | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push Images | ${{ needs.build-and-push-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis Deploy | ${{ needs.deploy-redis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Deploy | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migration | ${{ needs.migrate-database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-deploy Verification | ${{ needs.verify-deployment.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.image_tag }}" != "" ]; then
            echo "- Backend rollback/tag deployment executed (frontend unchanged)." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            echo "- [Production Site](https://solfoundry.org)" >> $GITHUB_STEP_SUMMARY
            echo "- [API Health](https://api.solfoundry.org/health)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- [Staging Site](${{ needs.deploy-frontend.outputs.vercel_preview_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- [Staging /health](${{ needs.deploy-frontend.outputs.vercel_preview_url }}/health)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on Success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify on Failure
        if: failure()
        run: echo "Deployment failed - check the logs above for details"