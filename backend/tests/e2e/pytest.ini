[pytest]
# E2E test suite configuration
# Markers allow selective test execution and CI parallelisation.
#
# Usage:
#   pytest backend/tests/e2e/ -v              # Run all E2E tests
#   pytest backend/tests/e2e/ -m lifecycle     # Only lifecycle tests
#   pytest backend/tests/e2e/ -m "not load"    # Skip load tests
#   pytest backend/tests/e2e/ -m concurrent    # Only concurrency tests
#   pytest backend/tests/e2e/ --tb=short       # Short tracebacks

markers =
    lifecycle: Full bounty lifecycle end-to-end tests
    dispute: Dispute resolution flow tests
    timeout: Timeout and auto-refund scenario tests
    concurrent: Concurrent submission tests
    auth: Authentication flow tests
    websocket: WebSocket real-time event tests
    load: Load and performance tests (may be slow)
    negative: Negative test cases and error handling

asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
