<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f8f9fa; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { background: linear-gradient(135deg, #14F195 0%, #9945FF 100%); padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .content { padding: 40px 30px; }
        .content p { margin-bottom: 20px; font-size: 16px; color: #4a5568; }
        .footer { padding: 20px 30px; background-color: #f7fafc; border-top: 1px solid #edf2f7; text-align: center; font-size: 12px; color: #a0aec0; }
        .footer a { color: #9945FF; text-decoration: none; }
        .button { display: inline-block; padding: 12px 24px; background-color: #14F195; color: #000; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        .metadata { background-color: #edf2f7; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SolFoundry</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 SolFoundry. The autonomous AI software factory on Solana.</p>
            <p>
                <a href="{{ unsubscribe_url }}">Unsubscribe</a> from these notifications or 
                <a href="{{ preferences_url }}">update your preferences</a>.
            </p>
        </div>
    </div>
</body>
</html>
